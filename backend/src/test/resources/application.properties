# 测试环境配置（仅 Surefire / @SpringBootTest 使用本 classpath；本地或 jar 运行主应用不会自动读此文件）
jwt.secret=01234567890123456789012345678901

# CORS：与本地开发常见 Origin 一致（Flutter Web 随机端口）；主应用运行请在 main 的 application 或环境变量中配置
app.cors.allowed-origins=http://localhost:*,http://127.0.0.1:*

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# 与 .github/workflows/ci.yml 中 MySQL 服务、init.sql 一致；写入文件可避免 Surefire 子进程未继承 Maven -D 时出现「无法创建 DataSource / ApplicationContext 失败」
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/beileme?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_general_ci
spring.datasource.username=root
spring.datasource.password=123456

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# 减少「Auto-configuration matched」刷屏，便于在 Actions 日志中定位失败原因
debug=false
logging.level.org.springframework.boot.autoconfigure=warn
logging.level.org.springframework.context=warn
