# 开发环境（Docker Compose V2，默认文件名 compose.yaml）
# 启动：docker compose -f compose.yaml --env-file .env up -d
# 说明：后端挂载 ./backend，容器内 mvn spring-boot:run；改 Java 源码后需在宿主机或 IDE 触发编译
#       更新 target/classes 后，Spring DevTools 会热重启（与纯 Vite 卷挂载行为不同）。
# 与 docker-compose.yml 共用项目名与卷名 beileme / mysql-data，勿同时起两套占同一端口。
# 前端：Flutter Web + Nginx（8080）；浏览器访问 http://localhost:${FRONTEND_PORT:-8081}

name: beileme

services:
  mysql:
    image: mysql:8.0
    container_name: beileme-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?请在 .env 中设置 MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-beileme}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --skip-character-set-client-handshake
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: beileme-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  backend:
    image: maven:3.9-eclipse-temurin-17-alpine
    container_name: beileme-backend-dev
    working_dir: /workspace
    volumes:
      - ./backend:/workspace
      - maven-repo:/root/.m2
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-beileme}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_general_ci
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:?请在 .env 中设置 MYSQL_ROOT_PASSWORD}
      SPRING_MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health
      LOGGING_LEVEL_COM_ZYCHEN_BACKEND: ${LOGGING_LEVEL_COM_ZYCHEN_BACKEND:-INFO}
      JWT_SECRET: ${JWT_SECRET:?请在 .env 中设置 JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    command: ["mvn", "-B", "-DskipTests", "spring-boot:run"]
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      disable: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: beileme-frontend:dev
    container_name: beileme-frontend-dev
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8081}:8080"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

volumes:
  mysql-data:
  redis-data:
  maven-repo:
