name: tests-and-coverage

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend:
    name: Backend (Java) tests + coverage
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: beileme
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p123456"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Initialize test database
        run: |
          mysql -h 127.0.0.1 -uroot -p123456 -e "SELECT 1"
          mysql -h 127.0.0.1 -uroot -p123456 < init.sql

      - name: Run backend tests (JaCoCo)
        run: |
          if [ -f backend/mvnw ]; then
            chmod +x backend/mvnw
            ./backend/mvnw -q -f backend/pom.xml test
          else
            mvn -q -f backend/pom.xml test
          fi

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/target/site/jacoco/jacoco.xml
          flags: backend
          fail_ci_if_error: true

