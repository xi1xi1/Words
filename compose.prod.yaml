# 生产编排：MySQL（secret）+ Redis + 后端镜像 + 前端静态镜像（Nginx 8080 → 宿主机 FRONTEND_PUBLISH_PORT 默认 80）
# 启动前：
#   1. secrets/mysql_root_password.txt（见 secrets/README.md）
#   2. .env 中 BACKEND_IMAGE、FRONTEND_IMAGE（GHCR 小写路径，见 .env.example）
#   3. docker compose -f compose.prod.yaml --env-file .env up -d
#   或使用 ./deploy.sh（需已 docker login ghcr.io 且镜像已推送）
#
# 与 compose.yaml / docker-compose.yml 共用卷 mysql-data（项目名均为 beileme），勿随意 down -v。

name: beileme

services:
  mysql:
    image: mysql:8.0
    container_name: beileme-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_DATABASE: ${MYSQL_DATABASE:-beileme}
      TZ: Asia/Shanghai
    secrets:
      - mysql_root_password
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --skip-character-set-client-handshake
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$(cat /run/secrets/mysql_root_password) || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: beileme-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    image: ${BACKEND_IMAGE:?请设置 BACKEND_IMAGE，例如 ghcr.io/owner/repo/backend:latest}
    container_name: beileme-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PUBLISH_PORT:-8080}:8080"
    environment:
      JAVA_OPTS: "-Dfile.encoding=UTF-8"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-beileme}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_general_ci
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health
      LOGGING_LEVEL_COM_ZYCHEN_BACKEND: ${LOGGING_LEVEL_COM_ZYCHEN_BACKEND:-INFO}
      JWT_SECRET: ${JWT_SECRET:?请在 .env 或部署环境中设置 JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    secrets:
      - mysql_root_password
    entrypoint:
      - /bin/sh
      - -c
      - |
        export SPRING_DATASOURCE_PASSWORD=$$(tr -d '\n' < /run/secrets/mysql_root_password)
        exec java $$JAVA_OPTS -jar /app/app.jar
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    image: ${FRONTEND_IMAGE:?请设置 FRONTEND_IMAGE，例如 ghcr.io/owner/repo/frontend:latest}
    container_name: beileme-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PUBLISH_PORT:-80}:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  mysql-data:
  redis-data:

secrets:
  mysql_root_password:
    file: ./secrets/mysql_root_password.txt
